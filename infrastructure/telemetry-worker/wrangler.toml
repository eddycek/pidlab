name = "pidlab-telemetry-dev"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# R2 bucket binding (dev)
[[r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "pidlab-telemetry-dev"

# No cron in dev (uncomment for prod)
# [triggers]
# crons = ["0 7 * * *"]

# Plain-text config (not secrets — deployed with worker)
[vars]
REPORT_EMAIL = "eddycek.ve@gmail.com"
REPORT_FROM_EMAIL = "onboarding@resend.dev"
DIAGNOSTIC_RATE_LIMIT_MAX = "5"
DIAGNOSTIC_RATE_LIMIT_WINDOW_MIN = "60"
TELEMETRY_RATE_LIMIT_WINDOW_MIN = "60"

# Secrets set via `wrangler secret put` (or Terraform):
# ADMIN_KEY, RESEND_API_KEY

[env.prod]
name = "pidlab-telemetry"

[env.prod.vars]
REPORT_EMAIL = "eddycek.ve@gmail.com"
REPORT_FROM_EMAIL = "onboarding@resend.dev"
DIAGNOSTIC_RATE_LIMIT_MAX = "5"
DIAGNOSTIC_RATE_LIMIT_WINDOW_MIN = "60"
TELEMETRY_RATE_LIMIT_WINDOW_MIN = "60"

[[env.prod.r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "pidlab-telemetry"

[env.prod.triggers]
crons = ["0 7 * * *"]
