name = "pidlab-telemetry-dev"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# R2 bucket binding (dev)
[[r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "pidlab-telemetry-dev"

# No cron in dev (uncomment for prod)
# [triggers]
# crons = ["0 7 * * *"]

# Secrets set via `wrangler secret put`:
# ADMIN_KEY, RESEND_API_KEY, REPORT_EMAIL, REPORT_FROM_EMAIL

[env.prod]
name = "pidlab-telemetry"
[[env.prod.r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "pidlab-telemetry"
[env.prod.triggers]
crons = ["0 7 * * *"]
