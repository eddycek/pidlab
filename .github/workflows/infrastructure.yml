name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
      - 'infrastructure/telemetry-worker/src/**'
      - 'infrastructure/license-worker/src/**'
      - '.github/workflows/infrastructure.yml'
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
      - 'infrastructure/telemetry-worker/src/**'
      - 'infrastructure/license-worker/src/**'
      - '.github/workflows/infrastructure.yml'

env:
  TF_DIR: infrastructure/terraform
  WORKER_DIR: infrastructure/telemetry-worker
  LICENSE_WORKER_DIR: infrastructure/license-worker

jobs:
  # ── Build Telemetry Worker bundle ────────────────────────────────
  build-worker:
    name: Build Telemetry Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install worker dependencies
        working-directory: ${{ env.WORKER_DIR }}
        run: npm install

      - name: Build bundle
        working-directory: ${{ env.WORKER_DIR }}
        run: npx esbuild src/index.ts --bundle --format=esm --outfile=../terraform/worker-bundle.js

      - uses: actions/upload-artifact@v4
        with:
          name: worker-bundle
          path: ${{ env.TF_DIR }}/worker-bundle.js

  # License worker is deployed via wrangler (not terraform) — no separate build job needed.
  # Wrangler builds from source during `wrangler deploy` in deploy-dev/deploy-prod.

  # ── Terraform Plan prod (internal PRs only) ────────────────────
  plan-prod:
    name: Plan (prod)
    needs: [build-worker]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: worker-bundle
          path: ${{ env.TF_DIR }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_STATE_R2_SECRET_ACCESS_KEY }}
        run: terraform init -backend-config=backend-prod.hcl

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_STATE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_PROVISIONING }}
          TF_VAR_admin_key: ${{ secrets.TELEMETRY_ADMIN_KEY_PROD }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_license_admin_key: ${{ secrets.LICENSE_ADMIN_KEY_PROD }}
          TF_VAR_license_ed25519_private_key: ${{ secrets.LICENSE_ED25519_PRIVATE_KEY }}
          TF_VAR_license_ed25519_public_key: ${{ secrets.LICENSE_ED25519_PUBLIC_KEY }}
        run: terraform plan -var-file=prod.tfvars -no-color

  # ── Deploy dev (internal PRs + push to main) ───────────────────
  deploy-dev:
    name: Deploy dev
    needs: [build-worker]
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/download-artifact@v4
        with:
          name: worker-bundle
          path: ${{ env.TF_DIR }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_STATE_R2_SECRET_ACCESS_KEY }}
        run: terraform init -backend-config=backend-dev.hcl

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_STATE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_PROVISIONING }}
          TF_VAR_admin_key: ${{ secrets.TELEMETRY_ADMIN_KEY_DEV }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_license_admin_key: ${{ secrets.LICENSE_ADMIN_KEY_DEV }}
          TF_VAR_license_ed25519_private_key: ${{ secrets.LICENSE_ED25519_PRIVATE_KEY }}
          TF_VAR_license_ed25519_public_key: ${{ secrets.LICENSE_ED25519_PUBLIC_KEY }}
        run: terraform apply -var-file=dev.tfvars -auto-approve

      - name: Deploy license worker (dev) + D1 migrations
        working-directory: ${{ env.LICENSE_WORKER_DIR }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PROVISIONING }}
          CLOUDFLARE_ACCOUNT_ID: 718d9177347897a7e4a282cdf5c38568
        run: |
          npm install
          npx wrangler deploy
          npx wrangler secret put ADMIN_KEY <<< "${{ secrets.LICENSE_ADMIN_KEY_DEV }}"
          npx wrangler secret put ED25519_PRIVATE_KEY <<< "${{ secrets.LICENSE_ED25519_PRIVATE_KEY }}"
          npx wrangler secret put ED25519_PUBLIC_KEY <<< "${{ secrets.LICENSE_ED25519_PUBLIC_KEY }}"
          npx wrangler d1 execute pidlab-license-dev --file=src/schema.sql --remote

  deploy-prod:
    name: Deploy prod
    needs: [build-worker, deploy-dev]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/download-artifact@v4
        with:
          name: worker-bundle
          path: ${{ env.TF_DIR }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_STATE_R2_SECRET_ACCESS_KEY }}
        run: terraform init -backend-config=backend-prod.hcl

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_STATE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_PROVISIONING }}
          TF_VAR_admin_key: ${{ secrets.TELEMETRY_ADMIN_KEY_PROD }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_license_admin_key: ${{ secrets.LICENSE_ADMIN_KEY_PROD }}
          TF_VAR_license_ed25519_private_key: ${{ secrets.LICENSE_ED25519_PRIVATE_KEY }}
          TF_VAR_license_ed25519_public_key: ${{ secrets.LICENSE_ED25519_PUBLIC_KEY }}
        run: terraform apply -var-file=prod.tfvars -auto-approve

      - name: Deploy license worker (prod) + D1 migrations
        working-directory: ${{ env.LICENSE_WORKER_DIR }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PROVISIONING }}
          CLOUDFLARE_ACCOUNT_ID: 718d9177347897a7e4a282cdf5c38568
        run: |
          npm install
          npx wrangler deploy --env prod
          npx wrangler secret put ADMIN_KEY --env prod <<< "${{ secrets.LICENSE_ADMIN_KEY_PROD }}"
          npx wrangler secret put ED25519_PRIVATE_KEY --env prod <<< "${{ secrets.LICENSE_ED25519_PRIVATE_KEY }}"
          npx wrangler secret put ED25519_PUBLIC_KEY --env prod <<< "${{ secrets.LICENSE_ED25519_PUBLIC_KEY }}"
          npx wrangler d1 execute pidlab-license --env prod --file=src/schema.sql --remote
